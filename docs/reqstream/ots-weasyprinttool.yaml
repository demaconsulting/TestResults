---
# WeasyPrintTool OTS Software Requirements
#
# Requirements for the WeasyPrintTool PDF generation tool.

sections:
  - title: OTS Software Requirements
    sections:
      - title: WeasyPrintTool Requirements
        requirements:
          - id: TestResults-OTS-WeasyPrintTool
            title: WeasyPrintTool shall convert HTML documentation to PDF release artifacts.
            justification: |
              DemaConsulting.WeasyPrintTool wraps the WeasyPrint HTML-to-PDF converter to produce
              the design documentation and requirements PDF artifacts included in each release.
              It runs in the documentation-generation job of the CI pipeline on Windows.
              VersionMark self-validation runs in the same CI job, so passing VersionMark tests
              on Windows are evidence that WeasyPrintTool executed without error.
            tags: [ots]
            tests:
              - "windows@VersionMark_CapturesVersions"
              - "windows@VersionMark_GeneratesMarkdownReport"
