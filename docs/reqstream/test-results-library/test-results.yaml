---
# TestResults unit requirements
#
# The TestResults class represents a named collection of test results for a complete test run,
# including run-level metadata such as an identifier, name, and user name.
#
# Platform and runtime requirements are in platform-requirements.yaml.
# IO subsystem and unit requirements are in the io/ subfolder.

sections:
  - title: TestResults Library Requirements
    sections:
      - title: TestResults Requirements
        requirements:
          - id: TestResults-Model-RunIdentity
            title: The TestResults class shall automatically assign a unique identifier to each test run.
            justification: |
              A test run must be uniquely identifiable so that result consumers and serializers can
              distinguish one run from another without relying on name or timing metadata. Auto-
              generating a GUID on construction ensures every instance is distinct from the moment
              of creation and no caller is required to supply or manage run identifiers.
            tests:
              - TestResults_Id_Default_IsNotEmpty
              - TestResults_Id_TwoInstances_AreUnique

          - id: TestResults-Model-RunName
            title: The TestResults class shall default the run name to an empty string.
            justification: |
              Serializers and consumers must be able to use a TestResults object immediately after
              construction without setting the run name. Defaulting Name to an empty string avoids
              null-reference issues and produces a predictably empty field in serialized output.
            tests:
              - TestResults_Name_Default_IsEmpty

          - id: TestResults-Model-RunUserName
            title: The TestResults class shall default the run user name to an empty string.
            justification: |
              Serializers and consumers must be able to use a TestResults object immediately after
              construction without setting the user name. Defaulting UserName to an empty string
              avoids null-reference issues and produces a predictably empty field in serialized output.
            tests:
              - TestResults_UserName_Default_IsEmpty

          - id: TestResults-Model-RunCollectionNonNull
            title: The TestResults class shall initialize the Results collection as non-null.
            justification: |
              Callers must be able to enumerate or add test results immediately after construction
              without first checking for a null collection. A non-null default ensures safe
              enumeration at any point without additional initialization steps.
            tests:
              - TestResults_Results_Default_IsNotNull

          - id: TestResults-Model-RunCollectionEmpty
            title: The TestResults class shall initialize the Results collection as empty.
            justification: |
              A newly constructed TestResults must not contain pre-populated results, ensuring that
              callers can build a result set from scratch without first clearing the collection.
            tests:
              - TestResults_Results_Default_IsEmpty
