---
# Software Unit Requirements for the TestResults Class
#
# The TestResults class represents a named collection of test results for a complete test run,
# including run-level metadata such as an identifier, name, and user name.
#
# Platform and runtime requirements are in platform-requirements.yaml.
# IO subsystem and unit requirements are in the io/ subfolder.

sections:
  - title: TestResults Unit Requirements
    requirements:
      - id: TestResults-Mdl-Collection
        title: The TestResults class shall represent a named collection of test results for a complete test run.
        justification: |
          A test run typically consists of many individual test results that must be grouped together
          with identifying metadata such as a name and a unique identifier. The TestResults collection
          provides this grouping, enabling serializers and consumers to treat a full test run as a
          single unit while preserving all individual results.
        tests:
          - TestResults_Id_Default_IsNotEmpty
          - TestResults_Id_TwoInstances_AreUnique
          - TestResults_Name_Default_IsEmpty
          - TestResults_UserName_Default_IsEmpty
          - TestResults_Results_Default_IsNotNull
          - TestResults_Results_Default_IsEmpty
