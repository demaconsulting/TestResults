---
# System-Level Platform and Runtime Requirements
#
# These requirements specify the platforms and runtimes the library must support.
# They ensure the library works across the required execution environments.
#
# Test links can include a source filter prefix (e.g. "windows@", "ubuntu@", "net8.0@") to restrict
# which test results count as evidence for a requirement. This is critical for platform and framework
# requirements - removing these filters invalidates the evidence-based proof.
#
# Source filter prefixes:
#   windows@TestName  - proves the test passed on a Windows platform
#   ubuntu@TestName   - proves the test passed on a Linux (Ubuntu) platform
#   macos@TestName    - proves the test passed on a macOS platform
#   net8.0@TestName   - proves the test passed under the .NET 8 runtime
#   net9.0@TestName   - proves the test passed under the .NET 9 runtime
#   net10.0@TestName  - proves the test passed under the .NET 10 runtime
#   net481@TestName   - proves the test passed under the .NET Framework 4.8.1 runtime

sections:
  - title: Platform Support
    requirements:
      - id: TestResults-Platform-Windows
        title: The library shall build and run on Windows platforms.
        justification: |
          DEMA Consulting libraries must support Windows as a major development platform.
          Most .NET developers use Windows as their primary development environment.
        tests:
          # Tests link to "windows" to ensure results come from Windows platform
          - "windows@TestResultsLibrary_FormatAgnosticModel_CanRepresentTestResults"
          - "windows@TestResultsLibrary_Serialize_InMemoryModel_ProducesTrxContent"
          - "windows@TestResultsLibrary_Serialize_InMemoryModel_ProducesJUnitContent"
          - "windows@TestResultsLibrary_Deserialize_TrxContent_ReturnsNavigableModel"
          - "windows@TestResultsLibrary_Deserialize_JUnitContent_ReturnsNavigableModel"

      - id: TestResults-Platform-Linux
        title: The library shall build and run on Linux platforms.
        justification: |
          DEMA Consulting libraries must support Linux for CI/CD and containerized environments.
          Many modern deployment environments use Linux containers.
        tests:
          # Tests link to "ubuntu" to ensure results come from Linux platform
          - "ubuntu@TestResultsLibrary_FormatAgnosticModel_CanRepresentTestResults"
          - "ubuntu@TestResultsLibrary_Serialize_InMemoryModel_ProducesTrxContent"
          - "ubuntu@TestResultsLibrary_Serialize_InMemoryModel_ProducesJUnitContent"
          - "ubuntu@TestResultsLibrary_Deserialize_TrxContent_ReturnsNavigableModel"
          - "ubuntu@TestResultsLibrary_Deserialize_JUnitContent_ReturnsNavigableModel"

      - id: TestResults-Platform-MacOS
        title: The library shall build and run on macOS platforms.
        justification: |
          DEMA Consulting libraries must support macOS for developers using Apple platforms.
          A significant portion of .NET developers use macOS as their primary development environment.
        tests:
          # Tests link to "macos" to ensure results come from macOS platform
          - "macos@TestResultsLibrary_FormatAgnosticModel_CanRepresentTestResults"
          - "macos@TestResultsLibrary_Serialize_InMemoryModel_ProducesTrxContent"
          - "macos@TestResultsLibrary_Serialize_InMemoryModel_ProducesJUnitContent"
          - "macos@TestResultsLibrary_Deserialize_TrxContent_ReturnsNavigableModel"
          - "macos@TestResultsLibrary_Deserialize_JUnitContent_ReturnsNavigableModel"

  - title: Runtime Support
    requirements:
      - id: TestResults-Runtime-Net8
        title: The library shall support .NET 8 runtime.
        justification: |
          .NET 8 is a Long-Term Support (LTS) release with support through November 2026. Supporting
          this framework ensures the library can be used in stable, enterprise environments that
          require long-term maintenance guarantees.
        tests:
          - net8.0@TestResultsLibrary_FormatAgnosticModel_CanRepresentTestResults
          - net8.0@TestResultsLibrary_Serialize_InMemoryModel_ProducesTrxContent
          - net8.0@TestResultsLibrary_Serialize_InMemoryModel_ProducesJUnitContent
          - net8.0@TestResultsLibrary_Deserialize_TrxContent_ReturnsNavigableModel
          - net8.0@TestResultsLibrary_Deserialize_JUnitContent_ReturnsNavigableModel

      - id: TestResults-Runtime-Net9
        title: The library shall support .NET 9 runtime.
        justification: |
          .NET 9 is a Standard-Term Support (STS) release that provides access to the latest
          framework features and performance improvements. Supporting this version allows users
          to benefit from the newest capabilities while maintaining compatibility with current
          development practices.
        tests:
          - net9.0@TestResultsLibrary_FormatAgnosticModel_CanRepresentTestResults
          - net9.0@TestResultsLibrary_Serialize_InMemoryModel_ProducesTrxContent
          - net9.0@TestResultsLibrary_Serialize_InMemoryModel_ProducesJUnitContent
          - net9.0@TestResultsLibrary_Deserialize_TrxContent_ReturnsNavigableModel
          - net9.0@TestResultsLibrary_Deserialize_JUnitContent_ReturnsNavigableModel

      - id: TestResults-Runtime-NetStd20
        title: The library shall support the .NET Standard 2.0 target framework.
        justification: |
          .NET Standard 2.0 is a widely-supported target framework that enables the library to
          be used in MSBuild extensions and other tooling that requires .NET Standard compatibility.
          Supporting this target framework ensures the library can be integrated into a broader
          range of .NET projects, including those targeting .NET Framework and older .NET Core versions.
        tests:
          - net481@TestResultsLibrary_FormatAgnosticModel_CanRepresentTestResults
          - net481@TestResultsLibrary_Serialize_InMemoryModel_ProducesTrxContent
          - net481@TestResultsLibrary_Serialize_InMemoryModel_ProducesJUnitContent
          - net481@TestResultsLibrary_Deserialize_TrxContent_ReturnsNavigableModel
          - net481@TestResultsLibrary_Deserialize_JUnitContent_ReturnsNavigableModel

      - id: TestResults-Runtime-Net10
        title: The library shall support .NET 10 runtime.
        justification: |
          .NET 10 is a Long-Term Support (LTS) release in the .NET platform roadmap. Supporting
          this runtime ensures the library remains current and provides a clear upgrade path
          for users as they adopt newer .NET versions.
        tests:
          - net10.0@TestResultsLibrary_FormatAgnosticModel_CanRepresentTestResults
          - net10.0@TestResultsLibrary_Serialize_InMemoryModel_ProducesTrxContent
          - net10.0@TestResultsLibrary_Serialize_InMemoryModel_ProducesJUnitContent
          - net10.0@TestResultsLibrary_Deserialize_TrxContent_ReturnsNavigableModel
          - net10.0@TestResultsLibrary_Deserialize_JUnitContent_ReturnsNavigableModel
