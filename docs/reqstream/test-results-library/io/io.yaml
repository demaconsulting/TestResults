---
# IO Subsystem Requirements
# This file covers the IO subsystem of the TestResults library.
# Unit-level requirements are in the individual unit files:
#   - serializer.yaml
#   - trx-serializer.yaml
#   - junit-serializer.yaml

sections:
  - title: IO Subsystem Requirements
    requirements:
      - id: TestResults-IO-Identify
        title: The IO subsystem shall identify the format of test result files.
        justification: |
          Automatic format identification is the primary entry point into the IO subsystem.
          Callers need to determine whether a file is in TRX or JUnit XML format before
          reading it, and the subsystem must provide this capability reliably so that
          higher-level code can route files to the appropriate deserializer.
        children:
          - TestResults-Serializer-FormatIdentify
        tests:
          - IO_Identify_TrxContent_ReturnsTrx
          - IO_Identify_JUnitContent_ReturnsJUnit

      - id: TestResults-IO-Deserialize
        title: The IO subsystem shall deserialize test results from supported file formats.
        justification: |
          Deserializing test result files into the in-memory model is the core responsibility
          of the IO subsystem. Supporting both TRX and JUnit XML ensures the library can
          integrate with the two dominant test result formats used across .NET and cross-platform
          CI/CD toolchains.
        children:
          - TestResults-Serializer-FormatConversion
          - TestResults-Trx-Deserialize
          - TestResults-JUnit-Deserialize
        tests:
          - IO_Deserialize_TrxContent_ReturnsTestResults
          - IO_Deserialize_JUnitContent_ReturnsTestResults

      - id: TestResults-IO-Serialize
        title: The IO subsystem shall serialize test results to supported file formats.
        justification: |
          Serializing an in-memory model to file formats is the symmetric counterpart of
          deserialization and is an equal core responsibility of the IO subsystem. Supporting
          both TRX and JUnit XML output ensures the library can produce test result files
          compatible with the two dominant formats used across .NET and cross-platform
          CI/CD toolchains.
        children:
          - TestResults-Trx-Serialize
          - TestResults-JUnit-Serialize
          - TestResults-SerializerHelpers-Utf8Encoding
        tests:
          - IO_Serialize_TestResults_ProducesTrxContent
          - IO_Serialize_TestResults_ProducesJUnitContent
