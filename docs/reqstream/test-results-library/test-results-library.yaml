---
# System-Level Requirements for the TestResults Library
#
# The TestResults Library provides a format-agnostic in-memory model for test results
# and supports reading and writing test result files in TRX and JUnit XML formats.
#
# System-level requirements describe the externally observable behavior of the library
# as a whole. Subsystem and unit requirements are in the individual files under this folder.

sections:
  - title: TestResults Library System Requirements
    requirements:
      - id: TestResultsLibrary-Model-FormatIndependence
        title: The TestResults Library shall provide a format-independent representation of test results.
        justification: |
          The library must represent test results in a way that is not tied to any particular file
          format. This allows callers to process results from different sources uniformly and enables
          conversion between formats without requiring format-specific logic in consuming code.
        children:
          - TestResults-Model-Collection
          - TestResults-Model-TestOutput
          - TestResults-Model-ErrorInfo
          - TestResults-Model-PassedOutcome
          - TestResults-Model-FailedOutcome
          - TestResults-Model-ErrorOutcome
          - TestResults-Model-TimeoutOutcome
          - TestResults-Model-NotExecutedOutcome
          - TestResults-Model-InconclusiveOutcome
          - TestResults-Model-AbortedOutcome
          - TestResults-Model-PendingOutcome
          - TestResults-Model-WarningOutcome
          - TestResults-Model-PassedButRunAbortedOutcome
          - TestResults-Model-NotRunnableOutcome
          - TestResults-Model-CompletedOutcome
          - TestResults-Model-InProgressOutcome
          - TestResults-Model-DisconnectedOutcome
        tests:
          - TestResultsLibrary_FormatAgnosticModel_CanRepresentTestResults
      - id: TestResultsLibrary-IO-ReadResults
        title: The TestResults Library shall read test result files into a structured, navigable collection.
        justification: |
          Users of the library must be able to read test results from files and access them
          programmatically. Without this capability the library cannot serve its primary purpose
          of providing access to test result data produced by CI/CD and test tooling.
        children:
          - TestResults-IO-Deserialize
        tests:
          - TestResultsLibrary_Deserialize_TrxContent_ReturnsNavigableModel
          - TestResultsLibrary_Deserialize_JUnitContent_ReturnsNavigableModel
      - id: TestResultsLibrary-IO-WriteResults
        title: The TestResults Library shall write test result data to test result files.
        justification: |
          Users of the library must be able to produce test result files from data built
          programmatically or converted from another format. Supporting both TRX and JUnit XML
          ensures the library can produce output compatible with the two dominant test result
          formats used across .NET and cross-platform CI/CD toolchains.
        children:
          - TestResults-IO-Serialize
        tests:
          - TestResultsLibrary_Serialize_InMemoryModel_ProducesTrxContent
          - TestResultsLibrary_Serialize_InMemoryModel_ProducesJUnitContent
