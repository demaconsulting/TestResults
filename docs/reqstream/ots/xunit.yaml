---
# xUnit OTS requirements
#
# Requirements for the xUnit v3 testing framework used to execute unit tests and produce TRX result files.

sections:
  - title: OTS Software Requirements
    sections:
      - title: xUnit Requirements
        requirements:
          - id: TestResults-OTS-XUnit
            title: xUnit v3 shall produce verified passing test results for all test methods in the project.
            justification: |
              xUnit v3 (xunit.v3, xunit.runner.visualstudio, and Microsoft.NET.Test.Sdk) is the
              unit-testing framework used by the project. It discovers and runs all test methods
              and writes result files that feed into coverage reporting and requirements
              traceability. Passing tests confirm the framework is functioning correctly.
            tags: [ots]
            tests:
              - TestResultsLibrary_FormatAgnosticModel_CanRepresentTestResults
              - TestResultsLibrary_Deserialize_TrxContent_ReturnsNavigableModel
              - TestResultsLibrary_Deserialize_JUnitContent_ReturnsNavigableModel
              - TestResultsLibrary_Serialize_InMemoryModel_ProducesTrxContent
              - TestResultsLibrary_Serialize_InMemoryModel_ProducesJUnitContent
