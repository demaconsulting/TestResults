---
# ReviewMark OTS requirements
#
# Requirements for the ReviewMark file review tool used to generate review plans and reports.

sections:
  - title: OTS Software Requirements
    sections:
      - title: ReviewMark Requirements
        requirements:
          - id: TestResults-OTS-ReviewMark-Operational
            title: ReviewMark shall respond to standard operational flags.
            justification: |
              DemaConsulting.ReviewMark is installed as a dotnet tool. It must load and respond to
              --version and --help before any CI pipeline step depends on it. A passing response to
              these flags confirms the binary is installed and executable.
            tags: [ots]
            tests:
              - ReviewMark_VersionDisplay
              - ReviewMark_HelpDisplay
          - id: TestResults-OTS-ReviewMark-PlanGeneration
            title: ReviewMark shall generate a review plan from the review configuration.
            justification: |
              DemaConsulting.ReviewMark reads the .reviewmark.yaml configuration to produce a review
              plan documenting file review coverage and currency. A successful pipeline run confirms
              that review plan generation is functioning.
            tags: [ots]
            tests:
              - ReviewMark_ReviewPlanGeneration
          - id: TestResults-OTS-ReviewMark-IndexScan
            title: ReviewMark shall scan the evidence store index to determine review currency.
            justification: |
              DemaConsulting.ReviewMark reads the evidence store index to incorporate review currency
              data into the review plan and report. A successful scan confirms the tool can locate
              and parse the index at its configured URL.
            tags: [ots]
            tests:
              - ReviewMark_IndexScan
          - id: TestResults-OTS-ReviewMark-WorkingDirectoryOverride
            title: ReviewMark shall accept a working directory override flag.
            justification: |
              DemaConsulting.ReviewMark supports a --working-dir flag that allows the tool to run
              from a directory other than the repository root. This is required for CI matrix builds
              that invoke the tool from a different working directory.
            tags: [ots]
            tests:
              - ReviewMark_WorkingDirectoryOverride
          - id: TestResults-OTS-ReviewMark-Enforcement
            title: ReviewMark shall exit non-zero when review coverage gaps are detected.
            justification: |
              DemaConsulting.ReviewMark supports an --enforce flag that causes it to exit non-zero
              if any file matched by the needs-review patterns is not assigned to a review-set.
              This makes coverage gaps build-breaking in the CI pipeline.
            tags: [ots]
            tests:
              - ReviewMark_Enforce
          - id: TestResults-OTS-ReviewMark-Elaboration
            title: ReviewMark shall expand a named review-set into a review checklist.
            justification: |
              DemaConsulting.ReviewMark supports an --elaborate flag that expands a named review-set
              into a checklist artifact used during the formal review session. This confirms the
              elaboration workflow is functional.
            tags: [ots]
            tests:
              - ReviewMark_Elaborate
          - id: TestResults-OTS-ReviewMark-Lint
            title: ReviewMark shall validate the review configuration file.
            justification: |
              DemaConsulting.ReviewMark supports a --lint flag that validates the .reviewmark.yaml
              configuration against its schema and reports any structural or semantic errors. It is
              invoked in lint.ps1 as a CI gate to prevent malformed configuration from reaching the
              pipeline.
            tags: [ots]
            tests:
              - ReviewMark_Lint
          - id: TestResults-OTS-ReviewMark-ReportGeneration
            title: ReviewMark shall generate a review report from the review configuration and evidence store.
            justification: |
              DemaConsulting.ReviewMark reads the .reviewmark.yaml configuration and the review
              evidence store to produce a review report summarizing completed reviews and identifying
              files with stale or missing review evidence. It runs in the same CI pipeline that
              produces the TRX test results, so a successful pipeline run is evidence that review
              report generation is functioning.
            tags: [ots]
            tests:
              - ReviewMark_ReviewReportGeneration
