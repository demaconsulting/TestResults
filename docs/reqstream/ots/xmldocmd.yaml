---
# XmlDocMarkdown OTS requirements
#
# Requirements for the xmldocmd API documentation generator used to produce
# Markdown documentation from the library assembly.

sections:
  - title: OTS Software Requirements
    sections:
      - title: XmlDocMarkdown Requirements
        requirements:
          - id: TestResults-OTS-XmlDocMd
            title: XmlDocMarkdown shall generate API documentation from the library assembly.
            justification: |
              xmldocmd generates Markdown API documentation from the TestResults library assembly
              and its XML documentation file. The generated documentation is distributed in the
              docs/ folder of the NuGet package, making all public types and members discoverable
              by consumers including automated agents. FileAssert validates the NuGet package
              contains the expected documentation files, proving xmldocmd executed correctly and
              produced meaningful output.
            tags: [ots]
            tests:
              - XmlDocMd_NuGetPackageContainsDocs
