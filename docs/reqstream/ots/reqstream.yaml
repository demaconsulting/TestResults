---
# ReqStream OTS requirements
#
# Requirements for the ReqStream requirements traceability tool used to enforce test coverage of requirements.

sections:
  - title: OTS Software Requirements
    sections:
      - title: ReqStream Requirements
        requirements:
          - id: TestResults-OTS-ReqStream
            title: ReqStream shall process requirements, generate traceability artifacts, filter by tags, and enforce test
              coverage.
            justification: |
              DemaConsulting.ReqStream processes requirements.yaml and the TRX test-result files to
              produce a requirements report, justifications document, and traceability matrix. It
              supports tag-based filtering for phased pipeline execution. When run with --enforce,
              it exits with a non-zero code if any requirement lacks test evidence, making unproven
              requirements a build-breaking condition. A successful pipeline run with --enforce proves
              all requirements are covered and that ReqStream is functioning.
            tags: [ots]
            tests:
              - ReqStream_RequirementsProcessing
              - ReqStream_TraceMatrix
              - ReqStream_ReportExport
              - ReqStream_TagsFiltering
              - ReqStream_EnforcementMode
