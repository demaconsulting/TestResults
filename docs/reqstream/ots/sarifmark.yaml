---
# SarifMark OTS requirements
#
# Requirements for the SarifMark SARIF report processing tool used to convert SARIF results to markdown.

sections:
  - title: OTS Software Requirements
    sections:
      - title: SarifMark Requirements
        requirements:
          - id: TestResults-OTS-SarifMark
            title: SarifMark shall convert SARIF results into a markdown report.
            justification: |
              DemaConsulting.SarifMark reads the SARIF output produced by CodeQL code scanning and
              renders it as a human-readable markdown document included in the release artifacts.
              It runs in the same CI pipeline that produces the TRX test results, so a successful
              pipeline run is evidence that SarifMark executed without error.
            tags: [ots]
            tests:
              - SarifMark_SarifReading
              - SarifMark_MarkdownReportGeneration
          - id: TestResults-OTS-SarifMark-Enforcement
            title: SarifMark shall exit non-zero when SARIF findings exceed the configured threshold.
            justification: |
              Enforcement makes quality-gate failures build-breaking: when the number of SARIF findings
              exceeds the configured threshold SarifMark returns a non-zero exit code, causing the CI
              pipeline to fail and preventing a release until the findings are resolved.
            tags: [ots]
            tests:
              - SarifMark_Enforcement
