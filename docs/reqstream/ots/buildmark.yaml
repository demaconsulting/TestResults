---
# BuildMark OTS requirements
#
# Requirements for the BuildMark build documentation tool used to generate build-notes from GitHub Actions metadata.

sections:
  - title: OTS Software Requirements
    sections:
      - title: BuildMark Requirements
        requirements:
          - id: TestResults-OTS-BuildMark-ReportGeneration
            title: BuildMark shall generate a markdown build-notes document from GitHub Actions workflow metadata.
            justification: |
              DemaConsulting.BuildMark queries the GitHub Actions API to capture workflow run
              details and renders them as a markdown build-notes document included in release
              artifacts. A successful CI run with the expected output file present proves this
              capability is operational.
            tags: [ots]
            tests:
              - BuildMark_MarkdownReportGeneration

          - id: TestResults-OTS-BuildMark-GitIntegration
            title: BuildMark shall record the commit SHA and branch associated with the build.
            justification: |
              Recording the commit SHA and branch in the build notes provides traceability between
              the built artifact and the source code state. This is required for reproducible builds
              and compliance evidence.
            tags: [ots]
            tests:
              - BuildMark_GitIntegration

          - id: TestResults-OTS-BuildMark-IssueTracking
            title: BuildMark shall list GitHub issues linked to the triggering commit or pull request.
            justification: |
              Linking issues to each build provides an audit trail connecting changes to their
              motivating requirements or defects. This supports compliance traceability from release
              artifact back to tracked work items.
            tags: [ots]
            tests:
              - BuildMark_IssueTracking

          - id: TestResults-OTS-BuildMark-KnownIssues
            title: BuildMark shall collect and report open issues labeled as known defects.
            justification: |
              Reporting known issues in the build notes makes the defect state of each release
              explicit, so reviewers can confirm which issues were outstanding at the time of
              release without separately querying the issue tracker.
            tags: [ots]
            tests:
              - BuildMark_KnownIssuesReporting
