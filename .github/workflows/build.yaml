---
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  # Performs quick quality checks for project formatting consistency including
  # markdown linting, spell checking, and YAML validation.
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # === INSTALL DEPENDENCIES ===
      # This section installs all required dependencies and tools for quality checks.
      # Downstream projects: Add any additional dependency installations here.

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore Tools
        run: >
          dotnet tool restore

      # === CAPTURE TOOL VERSIONS ===
      # This section captures the versions of all tools used in the build process.
      # Downstream projects: Add any additional tools to capture here.

      - name: Capture tool versions
        shell: bash
        run: |
          mkdir -p artifacts
          echo "Capturing tool versions..."
          dotnet versionmark --capture --job-id "quality" \
            --output "artifacts/versionmark-quality.json" -- \
            dotnet git versionmark
          echo "✓ Tool versions captured"

      # === CAPTURE OTS SELF-VALIDATION RESULTS ===
      # This section runs the self-validation of each OTS tool and saves TRX results
      # so that OTS Software Requirements in requirements.yaml can be satisfied.
      # Downstream projects: Add any additional OTS tool self-validation steps here.

      - name: Run VersionMark self-validation
        run: >
          dotnet versionmark
          --validate
          --results artifacts/versionmark-self-validation-quality.trx

      # === RUN QUALITY CHECKS ===
      # This section runs the linting and quality checks for the project.
      # Downstream projects: Add any additional quality check steps here.

      - name: Run markdown linter
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          globs: '**/*.md'

      - name: Run spell checker
        uses: streetsidesoftware/cspell-action@v8
        with:
          files: '**/*.{md,cs}'
          incremental_files_only: false

      - name: Run YAML linter
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yaml

      # === UPLOAD ARTIFACTS ===
      # This section uploads all generated artifacts for use by downstream jobs.
      # Downstream projects: Add any additional artifact uploads here.

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-quality
          path: artifacts/

  # Builds and unit-tests the project on supported operating systems to ensure
  # unit-tests operate on all platforms and to run SonarScanner for generating
  # the code quality report.
  build:
    name: Build ${{ matrix.os }}
    needs: quality-checks
    permissions:
      contents: read
      pull-requests: write

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:

      # === INSTALL DEPENDENCIES ===
      # This section installs all required dependencies and tools for building the project.
      # Downstream projects: Add any additional dependency installations here.

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Restore Tools
        run: >
          dotnet tool restore

      # === CAPTURE TOOL VERSIONS ===
      # This section captures the versions of all tools used in the build process.
      # Downstream projects: Add any additional tools to capture here.

      - name: Capture tool versions
        shell: bash
        run: |
          mkdir -p artifacts
          echo "Capturing tool versions..."
          # Create short job ID: build-windows, build-ubuntu, build-macos
          OS_SHORT=$(echo "${{ matrix.os }}" | sed 's/-latest//')
          JOB_ID="build-${OS_SHORT}"
          dotnet versionmark --capture --job-id "${JOB_ID}" \
            --output "artifacts/versionmark-${JOB_ID}.json" -- \
            dotnet git dotnet-sonarscanner versionmark
          echo "✓ Tool versions captured"

      # === CAPTURE OTS SELF-VALIDATION RESULTS ===
      # This section runs the self-validation of each OTS tool and saves TRX results
      # so that OTS Software Requirements in requirements.yaml can be satisfied.
      # Downstream projects: Add any additional OTS tool self-validation steps here.

      - name: Run VersionMark self-validation
        run: >
          dotnet versionmark
          --validate
          --results artifacts/versionmark-self-validation-${{ matrix.os }}.trx

      # === BUILD AND TEST ===
      # This section builds and tests the project.
      # Downstream projects: Add any additional build or test steps here.

      - name: Restore Dependencies
        run: >
          dotnet restore

      - name: Start Sonar Scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          dotnet dotnet-sonarscanner
          begin
          /k:"demaconsulting_TestResults"
          /o:"demaconsulting"
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.opencover.reportsPaths=**/*.opencover.xml
          /d:sonar.scanner.scanAll=false

      - name: Build
        run: >
          dotnet build
          --no-restore
          --configuration Release
          --property:Version=${{ inputs.version }}

      - name: Test
        run: >
          dotnet test
          --no-build
          --configuration Release
          --property:Version=${{ inputs.version }}
          --collect "XPlat Code Coverage;Format=opencover"
          --logger "trx;LogFilePrefix=${{ matrix.os }}"
          --results-directory artifacts

      - name: End Sonar Scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          dotnet dotnet-sonarscanner
          end
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Create Library Package
        run: >
          dotnet pack
          --no-build
          --no-restore
          --property:PackageVersion=${{ inputs.version }}

      # === UPLOAD ARTIFACTS ===
      # This section uploads all generated artifacts for use by downstream jobs.
      # Downstream projects: Add any additional artifact uploads here.

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-build-${{ matrix.os }}
          path: artifacts/

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.os }}
          path: |
            src/DemaConsulting.TestResults/bin/Release/*.nupkg
            src/DemaConsulting.TestResults/bin/Release/*.snupkg

  # Runs CodeQL security and quality analysis, gathering results to include
  # in the code quality report.
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: quality-checks
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      # === INSTALL DEPENDENCIES ===
      # This section installs all required dependencies and tools for CodeQL analysis.
      # Downstream projects: Add any additional dependency installations here.

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual
          queries: security-and-quality
          config-file: ./.github/codeql-config.yml

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Restore Tools
        run: >
          dotnet tool restore

      - name: Restore Dependencies
        run: >
          dotnet restore

      # === BUILD AND ANALYZE ===
      # This section builds the project and performs CodeQL analysis.
      # Downstream projects: Add any additional analysis steps here.

      - name: Build
        run: >
          dotnet build
          --no-restore
          --configuration Release
          --property:Version=${{ inputs.version }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
          output: artifacts
          upload: false

      # === UPLOAD ARTIFACTS ===
      # This section uploads all generated artifacts for use by downstream jobs.
      # Downstream projects: Add any additional artifact uploads here.

      - name: Upload CodeQL artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-codeql
          path: artifacts/

  # Builds the supporting documentation including user guides, requirements,
  # trace matrices, code quality reports, and build notes.
  build-docs:
    name: Build Documents
    runs-on: windows-latest
    needs: [build, codeql]
    permissions:
      contents: read

    steps:
      # === CHECKOUT AND DOWNLOAD ARTIFACTS ===
      # This section retrieves the code and all necessary artifacts from previous jobs.
      # Downstream projects: Add any additional artifact downloads here.

      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all job artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: 'artifacts-*'
          merge-multiple: true
        continue-on-error: true

      # === INSTALL DEPENDENCIES ===
      # This section installs all required dependencies and tools for document generation.
      # Downstream projects: Add any additional dependency installations here.

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Install npm dependencies
        run: npm install

      - name: Restore Tools
        run: dotnet tool restore

      # === CAPTURE TOOL VERSIONS ===
      # This section captures the versions of all tools used in the build process.
      # Downstream projects: Add any additional tools to capture here.

      - name: Capture tool versions for build-docs
        shell: bash
        run: |
          echo "Capturing tool versions..."
          dotnet versionmark --capture --job-id "build-docs" \
            --output "artifacts/versionmark-build-docs.json" -- \
            dotnet git node npm pandoc weasyprint sarifmark sonarmark reqstream buildmark versionmark reviewmark
          echo "✓ Tool versions captured"

      # === CAPTURE OTS SELF-VALIDATION RESULTS ===
      # This section runs the self-validation of each OTS tool and saves TRX results
      # so that OTS Software Requirements in requirements.yaml can be satisfied.
      # Downstream projects: Add any additional OTS tool self-validation steps here.

      - name: Run ReqStream self-validation
        run: >
          dotnet reqstream
          --validate
          --results artifacts/reqstream-self-validation.trx

      - name: Run BuildMark self-validation
        run: >
          dotnet buildmark
          --validate
          --results artifacts/buildmark-self-validation.trx

      - name: Run VersionMark self-validation
        run: >
          dotnet versionmark
          --validate
          --results artifacts/versionmark-self-validation.trx

      - name: Run SarifMark self-validation
        run: >
          dotnet sarifmark
          --validate
          --results artifacts/sarifmark-self-validation.trx

      - name: Run SonarMark self-validation
        run: >
          dotnet sonarmark
          --validate
          --results artifacts/sonarmark-self-validation.trx

      - name: Run ReviewMark self-validation
        run: >
          dotnet reviewmark
          --validate
          --results artifacts/reviewmark-self-validation.trx

      # === GENERATE MARKDOWN REPORTS ===
      # This section generates all markdown reports from various tools and sources.
      # Downstream projects: Add any additional markdown report generation steps here.

      - name: Generate Requirements Report, Justifications, and Trace Matrix
        run: >
          dotnet reqstream
          --requirements requirements.yaml
          --tests "artifacts/**/*.trx"
          --report docs/requirements_doc/requirements.md
          --justifications docs/requirements_doc/justifications.md
          --matrix docs/requirements_report/trace_matrix.md
          --enforce

      - name: Generate CodeQL Quality Report with SarifMark
        run: >
          dotnet sarifmark
          --sarif artifacts/csharp.sarif
          --report docs/code_quality/codeql-quality.md
          --heading "TestResults CodeQL Analysis"
          --report-depth 1

      - name: Display CodeQL Quality Report
        shell: bash
        run: |
          echo "=== CodeQL Quality Report ==="
          cat docs/code_quality/codeql-quality.md

      - name: Generate SonarCloud Quality Report
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarmark
          --server https://sonarcloud.io
          --project-key demaconsulting_TestResults
          --branch ${{ github.ref_name }}
          --token "$SONAR_TOKEN"
          --report docs/code_quality/sonar-quality.md
          --report-depth 1

      - name: Display SonarCloud Quality Report
        shell: bash
        run: |
          echo "=== SonarCloud Quality Report ==="
          cat docs/code_quality/sonar-quality.md

      - name: Generate Review Plan and Review Report with ReviewMark
        shell: bash
        run: >
          dotnet reviewmark
          --definition .reviewmark.yaml
          --plan docs/code_review_plan/plan.md
          --plan-depth 1
          --report docs/code_review_report/report.md
          --report-depth 1
          # TODO: Add --enforce once reviews branch is populated with review evidence PDFs and index.json

      - name: Display Review Plan
        shell: bash
        run: |
          echo "=== Review Plan ==="
          cat docs/code_review_plan/plan.md

      - name: Display Review Report
        shell: bash
        run: |
          echo "=== Review Report ==="
          cat docs/code_review_report/report.md

      - name: Generate Build Notes with BuildMark
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          dotnet buildmark
          --build-version ${{ inputs.version }}
          --report docs/build_notes.md
          --report-depth 1

      - name: Display Build Notes Report
        shell: bash
        run: |
          echo "=== Build Notes Report ==="
          cat docs/build_notes.md

      - name: Publish Tool Versions
        shell: bash
        run: |
          echo "Publishing tool versions..."
          dotnet versionmark --publish --report docs/build_notes/versions.md --report-depth 1 \
            -- "artifacts/**/versionmark-*.json"
          echo "✓ Tool versions published"

      - name: Display Tool Versions Report
        shell: bash
        run: |
          echo "=== Tool Versions Report ==="
          cat docs/build_notes/versions.md

      # === GENERATE HTML DOCUMENTS WITH PANDOC ===
      # This section converts markdown documents to HTML using Pandoc.
      # Downstream projects: Add any additional Pandoc HTML generation steps here.

      - name: Generate Build Notes HTML with Pandoc
        shell: bash
        run: >
          dotnet pandoc
          --defaults docs/build_notes/definition.yaml
          --filter node_modules/.bin/mermaid-filter.cmd
          --metadata version="${{ inputs.version }}"
          --metadata date="$(date +'%Y-%m-%d')"
          --output docs/build_notes/build_notes.html

      - name: Generate Guide HTML with Pandoc
        shell: bash
        run: >
          dotnet pandoc
          --defaults docs/guide/definition.yaml
          --filter node_modules/.bin/mermaid-filter.cmd
          --metadata version="${{ inputs.version }}"
          --metadata date="$(date +'%Y-%m-%d')"
          --output docs/guide/guide.html

      - name: Generate Code Quality HTML with Pandoc
        shell: bash
        run: >
          dotnet pandoc
          --defaults docs/code_quality/definition.yaml
          --filter node_modules/.bin/mermaid-filter.cmd
          --metadata version="${{ inputs.version }}"
          --metadata date="$(date +'%Y-%m-%d')"
          --output docs/code_quality/code_quality.html

      - name: Generate Requirements HTML with Pandoc
        shell: bash
        run: >
          dotnet pandoc
          --defaults docs/requirements_doc/definition.yaml
          --filter node_modules/.bin/mermaid-filter.cmd
          --metadata version="${{ inputs.version }}"
          --metadata date="$(date +'%Y-%m-%d')"
          --output docs/requirements_doc/requirements.html

      - name: Generate Trace Matrix HTML with Pandoc
        shell: bash
        run: >
          dotnet pandoc
          --defaults docs/requirements_report/definition.yaml
          --filter node_modules/.bin/mermaid-filter.cmd
          --metadata version="${{ inputs.version }}"
          --metadata date="$(date +'%Y-%m-%d')"
          --output docs/requirements_report/requirements_report.html

      - name: Generate Review Plan HTML with Pandoc
        shell: bash
        run: >
          dotnet pandoc
          --defaults docs/code_review_plan/definition.yaml
          --filter node_modules/.bin/mermaid-filter.cmd
          --metadata version="${{ inputs.version }}"
          --metadata date="$(date +'%Y-%m-%d')"
          --output docs/code_review_plan/code_review_plan.html

      - name: Generate Design Documentation HTML with Pandoc
        shell: bash
        run: >
          dotnet pandoc
          --defaults docs/design/definition.yaml
          --filter node_modules/.bin/mermaid-filter.cmd
          --metadata version="${{ inputs.version }}"
          --metadata date="$(date +'%Y-%m-%d')"
          --output docs/design/design.html

      - name: Generate Review Report HTML with Pandoc
        shell: bash
        run: >
          dotnet pandoc
          --defaults docs/code_review_report/definition.yaml
          --filter node_modules/.bin/mermaid-filter.cmd
          --metadata version="${{ inputs.version }}"
          --metadata date="$(date +'%Y-%m-%d')"
          --output docs/code_review_report/code_review_report.html

      # === GENERATE PDF DOCUMENTS WITH WEASYPRINT ===
      # This section converts HTML documents to PDF using Weasyprint.
      # Downstream projects: Add any additional Weasyprint PDF generation steps here.

      - name: Generate Build Notes PDF with Weasyprint
        run: >
          dotnet weasyprint
          --pdf-variant pdf/a-3u
          docs/build_notes/build_notes.html
          "docs/TestResults Build Notes.pdf"

      - name: Generate Guide PDF with Weasyprint
        run: >
          dotnet weasyprint
          --pdf-variant pdf/a-3u
          docs/guide/guide.html
          "docs/TestResults User Guide.pdf"

      - name: Generate Code Quality PDF with Weasyprint
        run: >
          dotnet weasyprint
          --pdf-variant pdf/a-3u
          docs/code_quality/code_quality.html
          "docs/TestResults Code Quality.pdf"

      - name: Generate Requirements PDF with Weasyprint
        run: >
          dotnet weasyprint
          --pdf-variant pdf/a-3u
          docs/requirements_doc/requirements.html
          "docs/TestResults Requirements.pdf"

      - name: Generate Trace Matrix PDF with Weasyprint
        run: >
          dotnet weasyprint
          --pdf-variant pdf/a-3u
          docs/requirements_report/requirements_report.html
          "docs/TestResults Requirements Report.pdf"

      - name: Generate Review Plan PDF with Weasyprint
        run: >
          dotnet weasyprint
          --pdf-variant pdf/a-3u
          docs/code_review_plan/code_review_plan.html
          "docs/TestResults Review Plan.pdf"

      - name: Generate Design Documentation PDF with Weasyprint
        run: >
          dotnet weasyprint
          --pdf-variant pdf/a-3u
          docs/design/design.html
          "docs/TestResults Design Documentation.pdf"

      - name: Generate Review Report PDF with Weasyprint
        run: >
          dotnet weasyprint
          --pdf-variant pdf/a-3u
          docs/code_review_report/code_review_report.html
          "docs/TestResults Review Report.pdf"

      # === UPLOAD ARTIFACTS ===
      # This section uploads all generated documentation artifacts.
      # Downstream projects: Add any additional artifact uploads here.

      - name: Upload documentation
        uses: actions/upload-artifact@v7
        with:
          name: documents
          path: |
            docs/*.pdf
            docs/build_notes.md
